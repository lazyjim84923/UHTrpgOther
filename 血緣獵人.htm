<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>血緣獵人</title>

<style>
    /* 這裡負責統一管理整個網頁的外觀 */
    body { 
        /* 在這裡改變字體！優先使用微軟正黑體，沒有的話用 Arial */
        font-family: "微軟正黑體", "Microsoft JhengHei", Arial, sans-serif;
        font-size: 12pt;
        line-height: 1.5; /* 行高 150% */
        text-align: justify; /* 左右對齊 */
        background-color: #FAF6E9; /* 我稍微吸取了你截圖上的背景色，讓它更有一致性 */
        color: #333; /* 字體顏色 */
        margin: 20px; /* 讓版面旁邊留點空白，比較好看 */
    }

    p {
        margin: 0 0 10px 0; /* 設定段落與段落之間的距離 */
    }

    /* 如果你想把那串 === 換成一條真正的分隔線，可以使用 <hr> 標籤 */
    hr {
        border: 0;
        border-top: 1px solid #ccc;
        margin: 15px 0;
    }
</style>

</head>

<body>
    <p>血源獵人</p>
    <p>本質：魔幻本質</p>
    <p>總描述：</p>
    <p>“我們誕生於神血 成長於神血 也會毀滅於神血 ”</p>
    <p>“我們眼界太過狹隘”“畏懼古神之血”</p>
    
    <p>===========================================================================================================</p>
    <p>兌換提示：比較中規中矩的血統，屬於如果購買對應戰鬥方式的話比較合適的血統，基本上沒有浪費掉的東西。</p>
    <p>技能樹雖然較少，但是也包括了恢復和攻擊以及防禦方面的能力。</p>
</body>
</html>
